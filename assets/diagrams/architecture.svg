<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .box { fill: #0b1220; stroke: #2b3340; stroke-width: 2; rx: 16; }
      .title { font: 700 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; fill: #e6edf3; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; fill: #a9b4c0; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas; fill: #c9d1d9; }
      .arrow { stroke: #6e7681; stroke-width: 2; marker-end: url(#m); }
      .accent { stroke: #8b5cf6; stroke-width: 2; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6e7681"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="1120" height="640" fill="#060b14" rx="24"/>
  <text x="70" y="95" class="title">Agent Twin Lab (BranchLab) — Architecture</text>
  <text x="70" y="125" class="text">Local-first replay + fork + compare + policy simulation</text>

  <!-- UI -->
  <rect x="90" y="170" width="380" height="210" class="box"/>
  <text x="120" y="210" class="title">Next.js Web UI</text>
  <text x="120" y="240" class="text">Runs • Timeline • Fork • Compare</text>
  <text x="120" y="265" class="text">Policy Lab • Export • Settings</text>

  <!-- API -->
  <rect x="520" y="170" width="260" height="210" class="box"/>
  <text x="550" y="210" class="title">Server APIs</text>
  <text x="550" y="240" class="text">Upload (stream)</text>
  <text x="550" y="265" class="text">Run queries</text>
  <text x="550" y="290" class="text">Fork jobs</text>
  <text x="550" y="315" class="text">Policy eval</text>

  <!-- Core -->
  <rect x="820" y="170" width="320" height="210" class="box"/>
  <text x="850" y="210" class="title">Core Libraries</text>
  <text x="850" y="240" class="text">Normalize → Index → Diff</text>
  <text x="850" y="265" class="text">First divergence + blame</text>
  <text x="850" y="290" class="text">Scoring + redaction</text>
  <text x="850" y="315" class="text">Export bundle builder</text>

  <!-- Storage -->
  <rect x="90" y="430" width="520" height="210" class="box"/>
  <text x="120" y="470" class="title">Local Persistence</text>
  <text x="120" y="500" class="mono">SQLite: runs, events, branches, policies</text>
  <text x="120" y="525" class="mono">.atl/blobs: content-addressed JSON payloads</text>
  <text x="120" y="550" class="text">Immutable originals + explicit derived branches</text>

  <!-- Policy -->
  <rect x="650" y="430" width="490" height="210" class="box"/>
  <text x="680" y="470" class="title">Policy Engine</text>
  <text x="680" y="500" class="text">YAML rules (default)</text>
  <text x="680" y="525" class="text">Optional Rego/WASM adapter</text>
  <text x="680" y="550" class="text">Outputs: allow/deny/hold + violations</text>

  <!-- arrows -->
  <line x1="470" y1="275" x2="520" y2="275" class="arrow"/>
  <line x1="780" y1="275" x2="820" y2="275" class="arrow"/>
  <line x1="650" y1="275" x2="650" y2="430" class="arrow"/>
  <line x1="420" y1="380" x2="350" y2="430" class="arrow"/>
  <line x1="650" y1="380" x2="750" y2="430" class="arrow"/>
  <line x1="520" y1="540" x2="650" y2="540" class="arrow"/>

  <!-- caption -->
  <text x="70" y="690" class="text">Tip: keep replay deterministic; require explicit opt-in for re-execution & live tools.</text>
</svg>
