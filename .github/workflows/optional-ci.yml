name: Optional CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: optional-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: make check
  e2e-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @branchlab/web exec playwright install --with-deps chromium
      - run: make e2e
      - run: make demo
